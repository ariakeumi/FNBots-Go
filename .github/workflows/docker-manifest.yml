# 仅做 manifest 合并并推送（解决国内直连 Docker Hub 超时）
# 使用前：本地已用 publish-multi-arch.sh 构建并推送 latest-amd64、latest-arm64
# 然后在本 workflow 中手动运行，用 GitHub 服务器完成 manifest create/push

name: Docker Manifest (multi-arch)

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Docker image name (e.g. sunanang/fn-message-bots)'
        required: true
        default: 'sunanang/fn-message-bots'
      tag:
        description: 'Tag (e.g. latest)'
        required: true
        default: 'latest'

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      # DOCKERHUB_TOKEN 须为 Personal Access Token（非登录密码）：https://hub.docker.com/settings/security
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest list
        run: |
          IMAGE="${{ inputs.image_name }}"
          TAG="${{ inputs.tag }}"
          FULL="${IMAGE}:${TAG}"
          AMD64="${IMAGE}:${TAG}-amd64"
          ARM64="${IMAGE}:${TAG}-arm64"
          docker manifest create "$FULL" "$AMD64" "$ARM64"
          docker manifest push "$FULL"
          echo "Done. Multi-arch image: $FULL"
