# 使用 buildx imagetools 合并 amd64/arm64 为多架构 manifest 并推送
# 使用前：本地已用 publish-multi-arch.sh 构建并推送 xxx-amd64、xxx-arm64，再手动运行本 workflow

name: Merge Docker Manifests

on:
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本标签 (例如: latest, v1.0)'
        required: true
        default: 'latest'
      amd64_tag:
        description: 'amd64 架构的镜像标签'
        required: true
        default: 'latest-amd64'
      arm64_tag:
        description: 'arm64 架构的镜像标签'
        required: true
        default: 'latest-arm64'

env:
  REGISTRY_IMAGE: sunanang/fn-message-bots

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # DOCKERHUB_TOKEN 必须是 Personal Access Token，不能是登录密码。创建：https://hub.docker.com/settings/security
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest list
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY_IMAGE }}:${{ github.event.inputs.version }} \
            ${{ env.REGISTRY_IMAGE }}:${{ github.event.inputs.amd64_tag }} \
            ${{ env.REGISTRY_IMAGE }}:${{ github.event.inputs.arm64_tag }}

      - name: Inspect the new manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ github.event.inputs.version }}
