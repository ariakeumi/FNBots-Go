services:
  fn-message-bot:
    image: sunanang/fn-message-bots:latest  # 使用预构建镜像
    container_name: fn-message-bot
    restart: unless-stopped
    network_mode: host
    privileged: true
    pid: host
    
    # 挂载系统日志目录（关键配置）
    volumes:
      # journal二进制日志（如果存在）
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      # 文本日志（可选）
      - /var/log/syslog:/var/log/syslog:ro
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/messages:/var/log/messages:ro
      - /var/log/daemon.log:/var/log/daemon.log:ro
      - /var/log/kern.log:/var/log/kern.log:ro
      - /var/log/user.log:/var/log/user.log:ro
      - /var/log/dmesg:/var/log/dmesg:ro
      # 应用数据目录
      - ./data/logs:/app/logs:rw
      - ./data/cursor:/tmp/cursor:rw
      # 配置文件目录
      - ./config:/app/config:ro
    
    # 环境变量配置
    environment:
      
      # 必须配置 - 替换为你自己的企业微信机器人webhook地址
      - WECHAT_WEBHOOK_URL=YOUR_WECHAT_WEBHOOK_URL # 请在此处直接配置你的Webhook地址
      
      # 监控配置（可选）
      - MONITOR_EVENTS=LoginSucc,LoginSucc2FA1,Logout,FoundDisk,APP_CRASH
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
      
      # 连接池配置（可选）
      - HTTP_POOL_SIZE=10
      - HTTP_RETRY_COUNT=3
      - HTTP_TIMEOUT=10
      - DEDUP_WINDOW=300
      
      # 高级配置（可选）
      - HEARTBEAT_INTERVAL=30
      - FILE_CHECK_INTERVAL=60
      - MAX_LOG_AGE=7

    # 更细粒度的能力（推荐）
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
      - SYS_PTRACE
      - AUDIT_READ