services:
  fn-message-bot:
    build: .
    container_name: fn-message-bot
    restart: unless-stopped
    network_mode: host
    privileged: true
    pid: host
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
      - SYS_PTRACE
      - AUDIT_READ
    
    volumes:
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /var/log:/var/log:ro
      - ./data/logs:/app/logs:rw
      - ./data/cursor:/tmp/cursor:rw
      - ./config:/app/config:ro
    
    environment:
      - WECHAT_WEBHOOK_URL=YOUR_WECHAT_WEBHOOK_URL
      - MONITOR_EVENTS=LoginSucc,LoginSucc2FA1,Logout,FoundDisk,APP_CRASH
      - LOG_LEVEL=INFO
      - TZ=Asia/Shanghai
      - HTTP_POOL_SIZE=10
      - HTTP_RETRY_COUNT=3
      - HTTP_TIMEOUT=10
      - DEDUP_WINDOW=300
      - HEARTBEAT_INTERVAL=30
      - FILE_CHECK_INTERVAL=60
      - MAX_LOG_AGE=7
