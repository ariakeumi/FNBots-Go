services:
  fn-message-bots:
    build: .
    container_name: fn-message-bots
    restart: unless-stopped
    # Web UI 端口映射（左侧为宿主机端口，可按需修改）
    ports:
      - "18080:18080"
    volumes:
      # 应用数据：运行日志与轮询游标（与 config 中 log_dir、cursor_dir 对应）
      - ./data/logs:/app/data/logs:rw
      - ./data/cursor:/app/data/cursor:rw
      # eventlogger 数据库（只读），供轮询 log 表
      - /usr/trim/var/eventlogger_service:/usr/trim/var/eventlogger_service:ro
      # 配置文件
      # 配置文件：需要可写以支持 Web UI 保存
      - ./config:/app/config:rw

    environment:
      - WECHAT_WEBHOOK_URL=${WECHAT_WEBHOOK_URL}
      - DINGTALK_WEBHOOK_URL=${DINGTALK_WEBHOOK_URL}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
      - BARK_URL=${BARK_URL}
      - TZ=Asia/Shanghai
      # 可选：若数据库路径不同可覆盖
      # - LOGGER_DB_PATH=/usr/trim/var/eventlogger_service/logger_data.db3
      # - LOGGER_POLL_INTERVAL=3
